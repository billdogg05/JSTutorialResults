<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Clock and Timer</title>
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <a href="../index.html" class="header-title"><img src="../assets/arrow-left.svg" alt="arrow left icon"
                        class="header-icon">Menu</a>
            </nav>
        </div>
    </header>

    <main>
        <section>
            <div class="medium-container">
                <h1>Password Generator</h1>
                <p class="description">Generate a password of any length and type. Indicate the desired length, then choose what to include in the password. Press the GENERATE button to see and copy the result.</p>
                <div class="small-container">
                    <div class="pass-field">
                        <div>
                            <label for="passLength">Password length</label>
                            <input type="number" name="passGen" id="passLength">
                        </div>
                        <div>
                            <label>Include: </label>
                            <div class="pass-checkbox">
                                <div>
                                    <input type="checkbox" name="passGen" id="passLower">
                                    <label for="passLower">Lower case</label>
                                </div>
                                <div>
                                    <input type="checkbox" name="passGen" id="passUpper">
                                    <label for="passUpper">Upper case</label>
                                </div>
                                <div>
                                    <input type="checkbox" name="passGen" id="passNumbers">
                                    <label for="passNumbers">Numbers</label>
                                </div>
                                <div>
                                    <input type="checkbox" name="passGen" id="passSymbols">
                                    <label for="passSymbols">Symbols</label>
                                </div>
                            </div>
                        </div>
                        <button id="passBtn">generate</button>
                        <p id="error"></p>
                        <div class="pass-result">
                            <span id="passRes"></span>
                            <button class="copy" onclick="copyPass()"><img src="../assets/copy.svg" alt=""></button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <p>Created by <a href="https://github.com/billdogg05" target="_blank">billdogg05</a></p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>

</body>

</html>
