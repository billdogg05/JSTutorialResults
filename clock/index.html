<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Clock and Timer</title>
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <a href="../index.html" class="header-title"><img src="../assets/arrow-left.svg" alt="arrow left icon"
                        class="header-icon">Menu</a>
            </nav>
        </div>
    </header>

    <main>
        <section>
            <div class="medium-container">
                <h1>Clock & Stopwatch</h1>
                <ul class="tabs">
                    <li class="tabs-item active">clock</li>
                    <li class="tabs-item">stopwatch</li>
                </ul>
                <div class="small-container">
                    <div class="clock-content tab-content-item active">
                        <div class="clock clock-watch-bg">
                            <div class="s"></div>
                            <div class="m"></div>
                            <div class="h"></div>
                            <div class="dot"></div>
                        </div>
                        <div class="clock-digital">07:20</div>
                    </div>
                    <div class="stopwatch-content tab-content-item">
                        <div class="stopwatch clock-watch-bg">
                            <div class="stopwatch-numbers">00 : 00 : 00</div>
                        </div>
                        <button id="stopwatch-btn">Start</button>
                    </div>
                </div>
            </div>
        </section>        
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <p>Created by <a href="https://github.com/billdogg05" target="_blank">billdogg05</a></p>
            </div>
        </div>
    </footer>


    <script src="script.js"></script>

</body>

</html>
