<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../style.css">
    <title>Clock and Timer</title>
</head>

<body>
    <header>
        <div class="container">
            <nav>
                <a href="../index.html" class="header-title"><img src="../assets/arrow-left.svg" alt="arrow left icon"
                        class="header-icon">Menu</a>
            </nav>
        </div>
    </header>

    <main>
        <section>
            <div class="medium-container">
                <h1>Slider</h1>
                <div class="slider">
                    <div class="slider-slides">
                        <div class="slider-slide">1</div>
                        <div class="slider-slide">2</div>
                        <div class="slider-slide">3</div>
                        <div class="slider-slide">4</div>
                        <div class="slider-slide">5</div>
                    </div>
                    <div class="slider-controls">
                        <button class="slider-prev slider-arrow"><img src="../assets/arrow-white.svg" alt=""></button>
                        <button class="slider-next slider-arrow"><img src="../assets/arrow-white.svg" alt="" class="slider-next"></button>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <div class="footer-content">
                <p>Created by <a href="https://github.com/billdogg05" target="_blank">billdogg05</a></p>
            </div>
        </div>
    </footer>

    <script src="script.js"></script>

</body>

</html>
